  <style>
    /* Theme the scroll-world engine with GreyCore's palette (matches the scene backgrounds). */
    :root, .sw-root {
      --sw-bg:        #0d1216;   /* == the generated scene background */
      --sw-ink:       #f2f4f5;
      --sw-ink-soft:  #9aa4a8;
      --sw-accent:    #00d4aa;   /* GreyCore green; per-section accents override at runtime */
      --sw-font-display: 'Bricolage Grotesque', 'Archivo', system-ui, sans-serif;
      --sw-font-body:    'Archivo', system-ui, sans-serif;
    }
    html, body { margin: 0; background: #0d1216; color: #f2f4f5; }
    body { font-family: 'Archivo', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

    /* --- Dark-theme fixes for the engine chrome (its defaults assume a LIGHT theme). --- */
    /* Unlayered rules beat the engine's @layer sw, restoring WCAG AA contrast. */
    /* Without this the primary CTA is #fff on a light --sw-ink == invisible. */
    /* Pin to fixed brand teal (not the per-section --sw-accent) so the conversion CTA */
    /* always clears WCAG AA (dark text on #00d4aa is ~5.2:1; red-accent scenes would be ~3.8:1). */
    .sw-topcta, .sw-btn--primary { background: #00d4aa; color: #0d1216; }
    .sw-topcta:hover, .sw-btn--primary:hover { background: #3df0cf; color: #0d1216; }
    .sw-nav { background: color-mix(in srgb, #0d1216 66%, transparent);
      border-color: color-mix(in srgb, var(--sw-accent) 24%, transparent); }
    .sw-nav__item { color: #c3ccd0; }
    .sw-nav__item:hover { color: #f2f4f5; }
    .sw-nav__item.is-active { color: #0d1216; background: var(--sw-accent); }

    /* Visually-hidden document heading (engine emits only h2 section titles). */
    .sw-sr { position: absolute; width: 1px; height: 1px; margin: -1px; padding: 0;
      overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0; }

    /* Real GreyCore cube logo in the brand mark (engine default is a plain accent square). */
    .sw-brand__mark { width: 30px; height: 30px; border-radius: 0; box-shadow: none;
      background: url('logo.svg') center / contain no-repeat;
      filter: drop-shadow(0 2px 7px rgba(0, 0, 0, 0.45)); }

    /* No-JS / hard-fallback: a quiet link back to the main site so the page is never a dead end. */
    .nojs {
      max-width: 640px; margin: 22vh auto; padding: 0 28px; text-align: center;
      font-family: 'Archivo', system-ui, sans-serif;
    }
    .nojs a { color: #00d4aa; }
    .nojs .mono { font-family: 'JetBrains Mono', monospace; letter-spacing: .04em; font-size: .82rem;
      text-transform: uppercase; color: #9aa4a8; }
  </style>
</head>
<body>

  <script>

          scroll: 1.6, linger: 0.4,
          eyebrow: 'Where it starts',
          title: 'Every company has a way in.',
          body: 'Before we touch anything, we look at what the internet already sees: your exposed edge, mapped the way an attacker finds it.',
          tags: ['External surface', 'Open services', 'Exposure map'],
        },

          clip: 'assets/scroll-world/vid/recon.mp4',

        {
          id: 'breach', label: 'Breach',
          still: 'assets/scroll-world/breach.webp',
          clip: 'assets/scroll-world/vid/breach.mp4',
          clipMobile: 'assets/scroll-world/vid/breach-m.mp4',
          accent: '#e5484d',

          title: 'Then we break in, for real.',
          body: 'Not a scanner guessing at CVEs. A human chaining the flaws that actually put someone inside your systems.',
          tags: ['Manual exploit', 'Chained flaws', 'Proof of impact'],
        },

      // length === sections.length - 1 (5), in order. Frame-locked per SKILL Step 5.
      // 4 of 5 fly-over connectors rendered; the last (report -> hardened) crossfades.
      connectors: [

        'assets/scroll-world/vid/conn2-m.mp4',
        'assets/scroll-world/vid/conn3-m.mp4',
        'assets/scroll-world/vid/conn4-m.mp4',
        null,
      ],
    });

    // A11y: the engine fades non-active copy to opacity 0 but leaves its CTA links
    // keyboard-focusable. Mirror visibility into `inert` so Tab skips off-screen controls
    // (WCAG 2.4.3 / 2.4.7). Reads the engine's own opacity output; no engine changes.
    (function () {
      var copies = document.querySelectorAll('.sw-copy');
      var queued = false;
      function sync() {
        queued = false;
        copies.forEach(function (c) {
          var visible = parseFloat(getComputedStyle(c).opacity) > 0.5;
          if (visible) c.removeAttribute('inert'); else c.setAttribute('inert', '');
        });
      }
      function schedule() { if (!queued) { queued = true; requestAnimationFrame(sync); } }
      addEventListener('scroll', schedule, { passive: true });
      addEventListener('resize', schedule, { passive: true });
      addEventListener('load', sync);
      sync();
    })();
  </script>
